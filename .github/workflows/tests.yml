name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = Sonoma arm64, macos-15 = Sequoia arm64,
        # macos-latest tracks GitHub's current default (advances over time).
        # Past breakage on macOS Tahoe 26 arm64 was hidden because CI
        # only ran macos-latest; pinning explicit versions surfaces
        # regressions on older supported macOS even after the default
        # advances.
        os: [ubuntu-latest, macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      # Previously this step was gated on `github.event_name ==
      # 'pull_request'`, so pushes to main never exercised the actual
      # install. PR #2 landed broken to main with green CI because the
      # install step was skipped. Run it on every event so trunk
      # regressions block as fast as PRs do.
      - run: brew test-bot --only-formulae
